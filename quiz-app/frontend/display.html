<!DOCTYPE html>
<html><head><meta charset="utf-8"><meta http-equiv="Cache-Control" content="no-store, must-revalidate"><title>Quiz Display</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css?v=9">
<script src="theme.js?v=1"></script>
<style>
  /* Phase 2 display polish */
  .round-progress {
    max-width: 900px; margin: 0 auto 24px; padding: 0 24px;
  }
  .round-progress .track {
    display: flex; gap: 6px; margin-top: 10px;
  }
  .round-progress .track .slot {
    flex: 1; height: 10px; border-radius: 5px;
    background: var(--bg-2); border: 1px solid var(--border);
  }
  .round-progress .track .slot.done { background: var(--good); border-color: var(--good); }
  .round-progress .track .slot.current {
    background: var(--accent); border-color: var(--accent);
    box-shadow: 0 0 12px rgba(99,102,241,0.6);
    animation: pulseSlot 1.4s ease-in-out infinite;
  }
  @keyframes pulseSlot { 50% { opacity: 0.6; } }
  .round-progress .label {
    text-align: center; color: var(--muted); font-size: 20px; font-weight: 600;
  }

  /* Leaderboard rank badges on team cards */
  .team-card { position: relative; }
  .team-card .rank {
    position: absolute; top: -14px; left: -14px;
    width: 44px; height: 44px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; font-weight: 800; color: #1a1a1a;
    background: var(--card); border: 3px solid var(--border);
    box-shadow: var(--shadow);
  }
  /* Rank badges share a neutral style so #1/#2/#3 don't look like
     different awards — the crown on the leader is the only distinction. */

  body.display .team-card .rank { width: 64px; height: 64px; font-size: 30px; top: -20px; left: -20px; border-width: 4px; }

  /* Score delta flash */
  .team-card .flash {
    position: absolute; top: 10px; right: 14px;
    font-size: 28px; font-weight: 800; color: var(--good);
    pointer-events: none; opacity: 0;
    animation: flashUp 1.6s ease-out forwards;
  }
  .team-card .flash.neg { color: var(--bad); }
  body.display .team-card .flash { font-size: 56px; top: 16px; right: 20px; }
  @keyframes flashUp {
    0%   { opacity: 0; transform: translateY(8px) scale(0.8); }
    15%  { opacity: 1; transform: translateY(0) scale(1.15); }
    70%  { opacity: 1; transform: translateY(-20px) scale(1); }
    100% { opacity: 0; transform: translateY(-48px) scale(0.95); }
  }

  .team-card.score-bump .score { animation: bumpScore 0.6s ease-out; }
  @keyframes bumpScore {
    0%, 100% { transform: scale(1); color: var(--text); }
    40% { transform: scale(1.2); color: var(--good); }
  }

  /* Between-question leaderboard heading */
  .leaderboard-title {
    text-align: center; font-size: 42px; font-weight: 800; margin: 20px 0 8px;
    background: linear-gradient(135deg,var(--accent),var(--accent-2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  body.display .leaderboard-title { font-size: 64px; }

  /* Circular timer ring */
  .timer-ring-wrap {
    display: flex; justify-content: center; margin-bottom: 20px;
  }
  .timer-ring {
    position: relative; width: clamp(160px, 16vw, 260px); aspect-ratio: 1;
  }
  .timer-ring svg { width: 100%; height: 100%; transform: rotate(-90deg); }
  .timer-ring .bg { stroke: var(--bg-2); }
  .timer-ring .fg { stroke-linecap: round; transition: stroke-dashoffset 0.25s linear, stroke 0.3s; }
  .timer-ring .txt {
    position: absolute; inset: 0; display: flex; align-items: center;
    justify-content: center; font-size: clamp(44px, 5vw, 80px);
    font-weight: 800; letter-spacing: -2px;
  }
  .timer-ring.warn .fg { stroke: var(--warn); }
  .timer-ring.warn .txt { color: var(--warn); }
  .timer-ring.crit .fg { stroke: var(--bad); }
  .timer-ring.crit .txt { color: var(--bad); }
  .timer-ring.crit { animation: timerPulse 0.7s ease-in-out infinite; }
  @keyframes timerPulse { 50% { transform: scale(1.06); } }

  /* Question crossfade */
  #qbox { transition: opacity 0.2s ease; }
  #qbox.fading { opacity: 0; }

  /* Bound the projector layout to one screen. The question region
     absorbs whatever vertical space is left between the header rows
     and the team strip pinned at the bottom. */
  body.display, html { height: 100%; }
  body.display { overflow: hidden; }
  body.display .container {
    height: 100vh;
    display: flex;
    flex-direction: column;
    gap: 14px;
    padding: 20px 28px;
  }
  body.display .container > #title,
  body.display .container > #round,
  body.display .container > #progress,
  body.display .container > #timerbanner,
  body.display .container > #teams { flex: 0 0 auto; }
  body.display .container > #qbox {
    flex: 1 1 0;
    min-height: 0;
    overflow: auto;
  }
  body.display #qbox > .q-card { margin: 0; }
  /* Compact projector team strip — keep the big scoreboard look, but cap
     the row height so the question region always has room. */
  body.display #teams.grid {
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 14px;
    margin-top: 0 !important;
    padding-top: 14px;
    border-top: 2px solid var(--border);
  }
  body.display .team-card {
    padding: 14px 18px;
    gap: 4px;
  }
  body.display .team-card .name {
    font-size: clamp(22px, 1.9vw, 30px);
  }
  body.display .team-card .score {
    font-size: clamp(48px, 5vw, 76px);
  }
  body.display .team-card .rank {
    width: 48px; height: 48px; font-size: 22px;
    top: -16px; left: -16px; border-width: 3px;
  }
  /* Scale media down so q-card never bullies the layout */
  body.display img.q-image { max-height: 36vh; }
  body.display .timer-ring { width: clamp(140px, 13vw, 220px); }
</style>
</head>
<body class="display">
<button class="theme-toggle floating" onclick="toggleTheme()" aria-label="Toggle theme"><span class="theme-icon">☀️</span></button>
<div class="container">

  <div id="title" class="title-banner" style="display:none"></div>

  <div id="round" class="round-banner"></div>
  <div id="progress" class="round-progress" style="display:none">
    <div class="label"><span id="progress-label"></span></div>
    <div class="track" id="progress-track"></div>
  </div>

  <div id="timerbanner"></div>

  <div id="qbox"></div>

  <div id="teams" class="grid grid-3" style="margin-top:24px"></div>

</div>
<script src="/quiz/socket.io/socket.io.js"></script>
<script>
const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

const prevScores = new Map(); // team_id -> last-seen score (for delta animation)

async function refresh() {
  try {
    const s = await fetch('api/public/state',{credentials:'same-origin'}).then(r=>r.json());
    render(s);
  } catch(e) { console.error(e); }
}

function renderProgress(s) {
  const box = document.getElementById('progress');
  if (!s.round || !s.round.question_ids?.length) { box.style.display = 'none'; return; }
  box.style.display = 'block';
  const ids = s.round.question_ids;
  const curIdx = s.question ? ids.indexOf(s.question.id) : -1;
  document.getElementById('progress-label').textContent =
    s.question ? `Question ${curIdx+1} of ${ids.length}` : `${ids.length} questions`;
  document.getElementById('progress-track').innerHTML = ids.map((_, i) => {
    const cls = i < curIdx ? 'done' : (i === curIdx ? 'current' : '');
    return `<div class="slot ${cls}"></div>`;
  }).join('');
}

function renderTeams(s) {
  const container = document.getElementById('teams');
  // Rank by score desc, tie-break by original position
  const ranked = [...s.teams].sort((a,b) => b.score - a.score || a.position - b.position);
  const assignedId = s.state.current_team_id;

  // Detect deltas vs previous snapshot
  const deltas = new Map();
  for (const t of ranked) {
    const prev = prevScores.get(t.id);
    if (prev !== undefined && prev !== t.score) deltas.set(t.id, t.score - prev);
    prevScores.set(t.id, t.score);
  }

  const topScore = ranked[0]?.score ?? 0;
  // Dense rank so tied teams share the same number (10,10,5 -> 1,1,2).
  const rankByTeam = new Map();
  let lastScore = null, denseRank = 0;
  for (const t of ranked) {
    if (t.score !== lastScore) { denseRank += 1; lastScore = t.score; }
    rankByTeam.set(t.id, denseRank);
  }

  container.innerHTML = ranked.map((t) => {
    const rank = rankByTeam.get(t.id);
    const isLeader = topScore > 0 && t.score === topScore;
    // Hide rank badges entirely when no one has scored yet.
    const showBadge = topScore > 0;
    const rankBadge = showBadge
      ? `<div class="rank ${rank <= 3 ? 'r'+rank : ''}">${isLeader ? '👑' : '#'+rank}</div>`
      : '';
    return `
      <div class="team-card ${assignedId===t.id?'active':''}" data-team="${t.id}" style="border-color:${t.color}">
        ${rankBadge}
        <div class="name"><span class="swatch" style="background:${t.color}"></span>${esc(t.name)}</div>
        <div class="score">${t.score}</div>
      </div>`;
  }).join('') || '<div class="empty"><div class="big">👥</div>No teams loaded yet</div>';

  // Attach flash + bump animations for teams whose score changed
  for (const [teamId, delta] of deltas) {
    const card = container.querySelector(`[data-team="${teamId}"]`);
    if (!card) continue;
    const flash = document.createElement('div');
    flash.className = 'flash' + (delta < 0 ? ' neg' : '');
    flash.textContent = (delta > 0 ? '+' : '') + delta;
    card.appendChild(flash);
    card.classList.add('score-bump');
    setTimeout(() => {
      flash.remove();
      card.classList.remove('score-bump');
    }, 1700);
  }
}

function renderLeaderboardEmpty(s) {
  // Shown between questions — keep audience engaged
  const ranked = [...s.teams].sort((a,b) => b.score - a.score || a.position - b.position);
  const hasScores = ranked.some(t => t.score !== 0);
  document.getElementById('qbox').innerHTML = ranked.length && hasScores
    ? `<div class="leaderboard-title">🏆 Leaderboard</div>
       <div class="empty" style="border:none;background:transparent;padding:20px 0;font-size:22px">Get ready for the next question!</div>`
    : '<div class="empty"><div class="big">🎯</div><h1>Get ready!</h1></div>';
}

function render(s) {
  const titleEl = document.getElementById('title');
  if (s.title) { titleEl.textContent = s.title; titleEl.style.display = 'block'; }
  else titleEl.style.display = 'none';

  renderTeams(s);

  document.getElementById('round').textContent = s.round
    ? `Round ${s.round.round_no} · ${s.round.name}` : '';

  renderProgress(s);

  const qb = document.getElementById('qbox');
  const nextQid = s.question ? s.question.id : null;
  const applyBody = () => {
    if (s.question) { renderQuestionBody(s); }
    else { renderLeaderboardEmpty(s); }
  };
  maybeCrossfade(nextQid, applyBody);
  renderTimer(s.state);
}

function renderQuestionBody(s) {
  const qb = document.getElementById('qbox');
  const q = s.question;
  {
    const wrongs = s.state.wrong_options || [];
    const removed = s.state.removed_option;
    let opts = '';
    if (q.type === 'mcq' && q.options) {
      const sel = s.state.selected_option;
      opts = '<div class="options">' +
        ['a','b','c','d'].filter(k=>q.options[k]).map(k => {
          const cls = [];
          if (s.state.revealed && q.answer===k) cls.push('correct');
          else if (wrongs.includes(k)) cls.push('wrong');
          if (sel===k) cls.push('selected');
          if (removed===k) cls.push('removed');
          return `<div class="option ${cls.join(' ')}"><span class="key">${k.toUpperCase()}.</span>${esc(q.options[k])}</div>`;
        }).join('') + '</div>';
    }
    const hintLvl = s.state.hint_level || 0;
    const passLvl = s.state.pass_level || 0;
    const assigned = s.teams.find(t => t.id === s.state.current_team_id);
    const lastForCurrent = (s.recent || []).find(r =>
      r.question_id === q.id && r.team_id === s.state.current_team_id &&
      ['correct','wrong','pass'].includes(r.result));
    const verdictHtml = lastForCurrent
      ? (lastForCurrent.result === 'correct'
          ? `<span class="verdict good">✓ Correct +${lastForCurrent.points_awarded}</span>`
          : lastForCurrent.result === 'wrong'
            ? `<span class="verdict bad">✗ Wrong</span>`
            : `<span class="verdict warn">↪ Passed</span>`)
      : (s.state.attempted ? `<span class="verdict bad">✗ Wrong</span>` : '');
    const assignedBanner = assigned
      ? `<div class="assigned-banner" style="border-color:${assigned.color}">
           <span class="swatch" style="background:${assigned.color}"></span>
           <span>Assigned to <b>${esc(assigned.name)}</b></span>
           ${verdictHtml}
         </div>` : '';
    qb.innerHTML = `
      <div class="q-card">
        ${assignedBanner}
        <div class="q-meta">
          <span class="badge">${esc(q.type)}</span>
          <span class="badge gray">${q.points} pts</span>
          ${passLvl>0?`<span class="badge warn">Pass ×${passLvl}</span>`:''}
          ${hintLvl>0?`<span class="badge warn">Hint ×${hintLvl}</span>`:''}
        </div>
        <div class="q-text">${esc(q.question)}</div>
        ${q.image ? `<img class="q-image" src="uploads/${esc(q.image)}">` : ''}
        ${q.audio ? `<audio class="q-audio" controls preload="metadata" src="uploads/${esc(q.audio)}" style="width:100%;margin-top:14px"></audio>` : ''}
        ${s.state.clue ? `<div class="clue-banner"><b>💡 Clue:</b> ${esc(s.state.clue)}</div>` : ''}
        ${opts}
        ${q.answer && q.type !== 'mcq' ? `<div class="answer-box"><b>Answer:</b> ${esc(q.answer)}</div>` : ''}
      </div>`;
  }
}
let timerTick = null;
const R = 46, C = 2 * Math.PI * R; // ring geometry (viewBox 100x100)
function renderTimer(st) {
  const box = document.getElementById('timerbanner');
  if (!box) return;
  if (timerTick) { clearInterval(timerTick); timerTick = null; }
  if (!st || !st.timer_started_at) { box.innerHTML = ''; return; }
  const start = new Date(st.timer_started_at).getTime();
  const dur = st.timer_duration || 30;
  box.innerHTML = `
    <div class="timer-ring-wrap">
      <div class="timer-ring" id="ring">
        <svg viewBox="0 0 100 100">
          <circle class="bg" cx="50" cy="50" r="${R}" fill="none" stroke-width="7"/>
          <circle class="fg" cx="50" cy="50" r="${R}" fill="none" stroke="var(--good)" stroke-width="7"
                  stroke-dasharray="${C}" stroke-dashoffset="0"/>
        </svg>
        <div class="txt">0</div>
      </div>
    </div>`;
  const ring = document.getElementById('ring');
  const fg = ring.querySelector('.fg');
  const txt = ring.querySelector('.txt');
  const update = () => {
    const elapsed = (Date.now() - start) / 1000;
    const left = Math.max(0, dur - elapsed);
    const shown = Math.ceil(left);
    const frac = Math.max(0, Math.min(1, left / dur));
    fg.style.strokeDashoffset = String(C * (1 - frac));
    txt.textContent = shown;
    ring.classList.toggle('crit', shown <= 5 && shown > 0);
    ring.classList.toggle('warn', shown > 5 && shown <= 10);
    if (left <= 0) { clearInterval(timerTick); timerTick = null; }
  };
  update(); timerTick = setInterval(update, 100);
}

// Crossfade qbox when the question id changes
let lastQid = null;
function maybeCrossfade(nextQid, apply) {
  const qb = document.getElementById('qbox');
  if (lastQid !== null && lastQid !== nextQid) {
    qb.classList.add('fading');
    setTimeout(() => { apply(); qb.classList.remove('fading'); lastQid = nextQid; }, 200);
  } else {
    apply(); lastQid = nextQid;
  }
}
const sock = io('/public', { path: '/quiz/socket.io' });
sock.on('connect', () => console.log('connected'));
sock.on('state', refresh);
refresh();
</script>
</body></html>
