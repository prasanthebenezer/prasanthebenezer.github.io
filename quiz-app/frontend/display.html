<!DOCTYPE html>
<html><head><meta charset="utf-8"><meta http-equiv="Cache-Control" content="no-store, must-revalidate"><title>Quiz Display</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css?v=12">
<script src="theme.js?v=1"></script>
<script src="audio.js?v=1"></script>
<style>
  /* Phase 2 display polish */
  .round-progress {
    max-width: 900px; margin: 0 auto 24px; padding: 0 24px;
  }
  .round-progress .track {
    display: flex; gap: 6px; margin-top: 10px;
  }
  .round-progress .track .slot {
    flex: 1; height: 10px; border-radius: 5px;
    background: var(--bg-2); border: 1px solid var(--border);
  }
  .round-progress .track .slot.done { background: var(--good); border-color: var(--good); }
  .round-progress .track .slot.current {
    background: var(--accent); border-color: var(--accent);
    box-shadow: 0 0 12px rgba(99,102,241,0.6);
    animation: pulseSlot 1.4s ease-in-out infinite;
  }
  @keyframes pulseSlot { 50% { opacity: 0.6; } }
  .round-progress .label {
    text-align: center; color: var(--muted); font-size: 20px; font-weight: 600;
  }

  /* Leaderboard rank badges on team cards */
  .team-card { position: relative; }
  .team-card .rank {
    position: absolute; top: -14px; left: -14px;
    width: 44px; height: 44px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; font-weight: 800; color: #1a1a1a;
    background: var(--card); border: 3px solid var(--border);
    box-shadow: var(--shadow);
  }
  /* Rank badges share a neutral style so #1/#2/#3 don't look like
     different awards — the crown on the leader is the only distinction. */

  body.display .team-card .rank { width: 64px; height: 64px; font-size: 30px; top: -20px; left: -20px; border-width: 4px; }

  /* Score delta flash */
  .team-card .flash {
    position: absolute; top: 10px; right: 14px;
    font-size: 28px; font-weight: 800; color: var(--good);
    pointer-events: none; opacity: 0;
    animation: flashUp 1.6s ease-out forwards;
  }
  .team-card .flash.neg { color: var(--bad); }
  body.display .team-card .flash { font-size: 56px; top: 16px; right: 20px; }
  @keyframes flashUp {
    0%   { opacity: 0; transform: translateY(8px) scale(0.8); }
    15%  { opacity: 1; transform: translateY(0) scale(1.15); }
    70%  { opacity: 1; transform: translateY(-20px) scale(1); }
    100% { opacity: 0; transform: translateY(-48px) scale(0.95); }
  }

  .team-card.score-bump .score { animation: bumpScore 0.6s ease-out; }
  @keyframes bumpScore {
    0%, 100% { transform: scale(1); color: var(--text); }
    40% { transform: scale(1.2); color: var(--good); }
  }

  /* Between-question leaderboard heading */
  .leaderboard-title {
    text-align: center; font-size: 42px; font-weight: 800; margin: 20px 0 8px;
    background: linear-gradient(135deg,var(--accent),var(--accent-2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  body.display .leaderboard-title { font-size: 64px; }

  /* Circular timer ring */
  .timer-ring-wrap {
    display: flex; justify-content: center; margin-bottom: 20px;
  }
  .timer-ring {
    position: relative; width: clamp(160px, 16vw, 260px); aspect-ratio: 1;
  }
  .timer-ring svg { width: 100%; height: 100%; transform: rotate(-90deg); }
  .timer-ring .bg { stroke: var(--bg-2); }
  .timer-ring .fg { stroke-linecap: round; transition: stroke-dashoffset 0.25s linear, stroke 0.3s; }
  .timer-ring .txt {
    position: absolute; inset: 0; display: flex; align-items: center;
    justify-content: center; font-size: clamp(44px, 5vw, 80px);
    font-weight: 800; letter-spacing: -2px;
  }
  .timer-ring.warn .fg { stroke: var(--warn); }
  .timer-ring.warn .txt { color: var(--warn); }
  .timer-ring.crit .fg { stroke: var(--bad); }
  .timer-ring.crit .txt { color: var(--bad); }
  .timer-ring.crit { animation: timerPulse 0.7s ease-in-out infinite; }
  @keyframes timerPulse { 50% { transform: scale(1.06); } }

  /* Question crossfade */
  #qbox { transition: opacity 0.2s ease; }
  #qbox.fading { opacity: 0; }

  /* Two-column projector layout — main question on the left, side
     panel with timer/progress/teams on the right. Page never scrolls;
     question content scales with the available space. */
  body.display, html { height: 100%; }
  body.display { overflow: hidden; }
  body.display .container {
    height: 100vh; max-width: none;
    display: grid;
    grid-template-columns: 1fr clamp(280px, 22vw, 360px);
    grid-template-rows: auto 1fr;
    grid-template-areas:
      "title  title"
      "main   panel";
    gap: 16px;
    padding: 16px 20px;
    overflow: hidden;
  }
  body.display .container > #title { grid-area: title; margin: 0; }

  /* Left column — fills the cell. q-card flexes its image to absorb
     leftover vertical space; q-text and options never get scrollbars. */
  body.display .container > #qbox {
    grid-area: main;
    min-height: 0; min-width: 0;
    overflow: hidden;
    display: flex; flex-direction: column;
  }
  body.display #qbox > .q-card {
    margin: 0; padding: 24px;
    flex: 1 1 0; min-height: 0;
    display: flex; flex-direction: column; gap: 12px;
    overflow: hidden;
  }
  body.display .q-card > .assigned-banner,
  body.display .q-card > .q-meta,
  body.display .q-card > .q-text,
  body.display .q-card > .clue-banner,
  body.display .q-card > .options,
  body.display .q-card > .answer-box,
  body.display .q-card > audio { flex: 0 0 auto; margin: 0; }
  body.display .q-card > .q-text {
    font-size: clamp(24px, 3.4vh, 44px);
    line-height: 1.3; margin: 0;
  }
  body.display .q-card img.q-image {
    flex: 1 1 0; min-height: 0;
    max-height: none; max-width: 100%;
    width: auto; height: auto;
    object-fit: contain; align-self: center;
    margin: 0; border-radius: 12px;
  }
  body.display .q-card .options {
    grid-template-columns: 1fr 1fr; gap: 8px; margin: 0;
  }
  body.display .q-card .option {
    font-size: clamp(16px, 2.2vh, 26px);
    padding: clamp(8px, 1.4vh, 18px);
  }
  body.display .q-card .answer-box { font-size: clamp(18px, 2.4vh, 28px); padding: 12px 16px; }
  body.display .q-card .clue-banner { font-size: clamp(16px, 2vh, 22px); padding: 10px 14px; }

  /* Right column — round + progress + timer + teams stacked, no scroll. */
  body.display .right-panel {
    grid-area: panel;
    min-height: 0; min-width: 0;
    display: flex; flex-direction: column;
    gap: 12px; overflow: hidden;
    padding: 16px;
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 16px;
  }
  body.display .right-panel #round {
    margin: 0; padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
    font-size: 16px; text-align: left;
    color: var(--text); font-weight: 700;
  }
  body.display .right-panel #round:empty { display: none; }
  body.display .right-panel #progress {
    margin: 0; padding: 0; max-width: none;
    flex: 0 0 auto;
  }
  body.display .right-panel #progress .label {
    font-size: 13px; text-align: left; margin-bottom: 6px;
  }
  body.display .right-panel #progress .track .slot { height: 8px; }
  body.display .right-panel #timerbanner { flex: 0 0 auto; min-height: 0; }
  body.display .right-panel #timerbanner:empty { display: none; }
  body.display .right-panel .timer-ring-wrap { margin: 0; }
  body.display .right-panel .timer-ring {
    width: clamp(120px, 16vw, 180px); margin: 0 auto;
  }
  body.display .right-panel .timer-ring .txt {
    font-size: clamp(36px, 4vw, 60px);
  }

  /* Teams: vertical stack of compact rows inside the panel. */
  body.display .right-panel #teams.grid {
    display: flex !important;
    flex-direction: column;
    gap: 8px; margin-top: 0 !important;
    flex: 1 1 0; min-height: 0;
    padding-top: 8px;
    border-top: 1px solid var(--border);
  }
  body.display .right-panel .team-card {
    padding: 10px 14px; gap: 4px;
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: center;
    flex: 1 1 0; min-height: 0;
  }
  body.display .right-panel .team-card .name {
    font-size: clamp(15px, 2vh, 22px); font-weight: 700;
    grid-column: 1; grid-row: 1;
  }
  body.display .right-panel .team-card .score {
    font-size: clamp(36px, 6vh, 72px); font-weight: 800;
    grid-column: 2; grid-row: 1 / span 2;
    line-height: 1; letter-spacing: -2px;
  }
  body.display .right-panel .team-card .name .swatch {
    width: 12px; height: 12px;
  }
  body.display .right-panel .team-card .rank {
    position: static;
    width: 28px; height: 28px; font-size: 14px;
    border-width: 2px;
    grid-column: 1; grid-row: 2;
    justify-self: start;
  }
  body.display .right-panel .team-card.active {
    transform: none;  /* override the scale(1.06) from styles.css */
    border-width: 3px;
  }
  body.display .right-panel .team-card.active::before {
    font-size: 11px; padding: 2px 8px; top: -10px;
  }
  body.display .right-panel .team-card .flash {
    font-size: clamp(20px, 3vh, 36px);
  }

  /* Empty/leaderboard placeholders inside the bounded qbox */
  body.display #qbox > .empty {
    flex: 1 1 0; min-height: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    margin: 0;
  }
  body.display #qbox > .leaderboard-title { flex: 0 0 auto; margin: 8px 0; }

  /* Smaller "Assigned to <team>" banner — was 32px font / 18px padding,
     now compact so the question + image dominate the projector area. */
  body.display .assigned-banner {
    font-size: clamp(14px, 1.8vh, 20px);
    padding: 6px 12px; margin: 0 0 8px;
    border-width: 1px; border-radius: 8px;
    gap: 8px;
  }
  body.display .assigned-banner .swatch { width: 12px; height: 12px; }
  body.display .verdict {
    font-size: clamp(12px, 1.6vh, 16px); padding: 3px 10px;
  }

  /* Forced "Leaderboard" mode — single column, large rows */
  body.display #qbox > .lb-wrap {
    flex: 1 1 0; min-height: 0;
    display: flex; flex-direction: column; gap: 12px;
    padding: 8px;
  }
  body.display #qbox .lb-list {
    flex: 1 1 0; min-height: 0;
    display: flex; flex-direction: column; gap: 10px;
  }
  body.display #qbox .lb-row {
    flex: 1 1 0; min-height: 0;
    display: grid;
    grid-template-columns: auto auto 1fr auto;
    align-items: center; gap: 16px;
    padding: 12px 24px;
    background: var(--bg-2);
    border: 3px solid var(--border);
    border-radius: 14px;
  }
  body.display #qbox .lb-row.leader {
    box-shadow: 0 0 0 3px rgba(245,158,11,0.35);
  }
  body.display #qbox .lb-rank {
    font-size: clamp(28px, 4vh, 56px); font-weight: 800; min-width: 60px; text-align: center;
  }
  body.display #qbox .lb-swatch {
    width: clamp(18px, 2.5vh, 28px); height: clamp(18px, 2.5vh, 28px); border-radius: 6px;
  }
  body.display #qbox .lb-name {
    font-size: clamp(24px, 3.5vh, 48px); font-weight: 700;
  }
  body.display #qbox .lb-score {
    font-size: clamp(36px, 6vh, 80px); font-weight: 800; letter-spacing: -2px;
  }

  /* Forced "Hidden" mode — branded holding screen with a soft glow + bobbing
     mark. The audience should feel the quiz is in progress, not broken. */
  body.display #qbox > .hold-screen {
    flex: 1 1 0; min-height: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: clamp(14px, 2.4vh, 26px);
    padding: 40px;
    background:
      radial-gradient(circle at 50% 35%, rgba(99,102,241,0.18), transparent 60%),
      linear-gradient(135deg, var(--card) 0%, var(--surface) 100%);
    border: 1px solid var(--border);
    border-radius: 22px;
    position: relative; overflow: hidden;
    text-align: center;
  }
  body.display #qbox > .hold-screen::before {
    content: ''; position: absolute; inset: -25%;
    background: radial-gradient(circle at 50% 50%, rgba(139,92,246,0.18), transparent 55%);
    animation: holdGlow 8s ease-in-out infinite; pointer-events: none;
  }
  @keyframes holdGlow {
    0%, 100% { transform: scale(1); opacity: 0.55; }
    50%      { transform: scale(1.12); opacity: 1; }
  }
  body.display #qbox .hold-mark {
    font-size: clamp(80px, 14vh, 180px);
    filter: drop-shadow(0 10px 28px rgba(99,102,241,0.45));
    animation: holdBob 4s ease-in-out infinite;
    position: relative; z-index: 1;
  }
  @keyframes holdBob {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(-12px); }
  }
  body.display #qbox .hold-title {
    font-size: clamp(36px, 7vh, 96px); font-weight: 900;
    letter-spacing: -1.5px; line-height: 1.05;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    position: relative; z-index: 1;
    max-width: 90%;
  }
  body.display #qbox .hold-sub {
    color: var(--muted);
    font-size: clamp(13px, 2vh, 22px);
    font-weight: 700; letter-spacing: 4px;
    text-transform: uppercase;
    position: relative; z-index: 1;
  }
  body.display #qbox .hold-sub .live-dot {
    display: inline-block; width: 9px; height: 9px;
    border-radius: 50%; background: var(--good);
    margin-right: 8px; vertical-align: middle;
    box-shadow: 0 0 12px var(--good);
    animation: liveDot 1.4s ease-in-out infinite;
  }
  @keyframes liveDot { 50% { opacity: 0.4; transform: scale(0.85); } }

  /* Rules-mode projector screen — large heading, scrollable rules body. */
  body.display #qbox > .rules-wrap {
    flex: 1 1 0; min-height: 0;
    display: flex; flex-direction: column; gap: 18px;
    padding: 28px 36px;
    background: linear-gradient(135deg, var(--card) 0%, var(--surface) 100%);
    border: 1px solid var(--border); border-radius: 16px;
  }
  body.display #qbox .rules-head {
    display: flex; align-items: baseline; gap: 14px; flex-wrap: wrap;
    border-bottom: 1px solid var(--border); padding-bottom: 14px;
  }
  body.display #qbox .rules-head .rno {
    font-size: clamp(20px, 2.6vh, 32px); color: var(--muted); font-weight: 700;
    letter-spacing: 1px; text-transform: uppercase;
  }
  body.display #qbox .rules-head .rname {
    font-size: clamp(36px, 5.2vh, 72px); font-weight: 800; letter-spacing: -1px;
    background: linear-gradient(135deg,var(--accent),var(--accent-2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  body.display #qbox .rules-head .rtype {
    margin-left: auto; padding: 6px 14px; border-radius: 999px;
    background: var(--bg-2); border: 1px solid var(--border);
    font-size: clamp(14px, 1.8vh, 20px); font-weight: 700;
    color: var(--muted); text-transform: uppercase; letter-spacing: 1px;
  }
  body.display #qbox .rules-body {
    flex: 1 1 0; min-height: 0; overflow: auto;
    font-size: clamp(20px, 3.2vh, 36px);
    line-height: 1.5; white-space: pre-wrap;
  }
  body.display #qbox .rules-body ul { padding-left: 1.4em; margin: 0; }
  body.display #qbox .rules-body li { margin: 6px 0; }
  body.display #qbox .rules-foot {
    text-align: center; font-size: clamp(18px, 2.4vh, 28px);
    color: var(--muted); font-weight: 700;
    padding-top: 8px; border-top: 1px solid var(--border);
  }

  /* Round-intro screen — cinematic "Round N · The Mystery Round" takeover.
     Each line has a staggered slide-up so the projector feels deliberate
     when the host triggers it between rounds. */
  body.display #qbox > .intro-screen {
    flex: 1 1 0; min-height: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: clamp(10px, 2vh, 22px);
    padding: 40px;
    background:
      radial-gradient(circle at 30% 20%, rgba(99,102,241,0.25), transparent 55%),
      radial-gradient(circle at 70% 80%, rgba(245,158,11,0.20), transparent 55%),
      linear-gradient(135deg, var(--card) 0%, var(--surface) 100%);
    border: 1px solid var(--border);
    border-radius: 22px;
    position: relative; overflow: hidden;
    text-align: center;
  }
  body.display #qbox > .intro-screen::before {
    content: ''; position: absolute; inset: -25%;
    background: radial-gradient(circle at 50% 50%, rgba(139,92,246,0.16), transparent 60%);
    animation: holdGlow 7s ease-in-out infinite; pointer-events: none;
  }
  body.display #qbox .intro-screen > * { position: relative; z-index: 1; opacity: 0; }
  body.display #qbox .intro-label {
    font-size: clamp(16px, 2.4vh, 28px); color: var(--muted);
    letter-spacing: clamp(6px, 1.2vh, 14px); text-transform: uppercase;
    font-weight: 800; margin-bottom: clamp(4px, 1vh, 12px);
    animation: introIn 0.7s cubic-bezier(0.22, 1, 0.36, 1) 0.05s forwards;
  }
  body.display #qbox .intro-name {
    font-size: clamp(48px, 11vh, 156px); font-weight: 900;
    letter-spacing: -2px; line-height: 1.0;
    background: linear-gradient(135deg, var(--accent), var(--accent-2) 50%, var(--warn));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    max-width: 92%;
    animation: introIn 0.9s cubic-bezier(0.22, 1, 0.36, 1) 0.30s forwards;
  }
  body.display #qbox .intro-meta {
    display: inline-flex; gap: clamp(8px, 1.6vh, 18px); flex-wrap: wrap;
    align-items: center; justify-content: center;
    animation: introIn 0.7s cubic-bezier(0.22, 1, 0.36, 1) 0.55s forwards;
  }
  body.display #qbox .intro-meta .pill {
    padding: clamp(6px, 1vh, 12px) clamp(14px, 2.2vh, 22px);
    border-radius: 999px;
    background: var(--bg-2); border: 2px solid var(--border);
    font-size: clamp(14px, 2vh, 24px); font-weight: 800;
    color: var(--text); letter-spacing: 2px; text-transform: uppercase;
  }
  body.display #qbox .intro-meta .pill.accent {
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    color: white; border-color: transparent;
  }
  body.display #qbox .intro-cta {
    margin-top: clamp(10px, 2.2vh, 26px);
    font-size: clamp(18px, 3vh, 38px); font-weight: 900;
    color: var(--warn); letter-spacing: clamp(3px, 0.6vh, 8px);
    text-transform: uppercase;
    animation: introIn 0.7s cubic-bezier(0.22, 1, 0.36, 1) 0.85s forwards,
               ctaPulse 1.6s ease-in-out 1.55s infinite;
  }
  @keyframes introIn {
    from { opacity: 0; transform: translateY(20px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0)    scale(1); }
  }
  @keyframes ctaPulse { 50% { opacity: 0.6; transform: scale(1.04); } }

  /* Finale screen — podium with the winner front-and-center, 2nd/3rd flanking,
     plus a CSS-only confetti shower. Toggled via a fixed-position confetti
     layer in the body so re-renders don't restart the falling animation. */
  body.display #qbox > .finale-screen {
    flex: 1 1 0; min-height: 0;
    display: grid;
    grid-template-rows: auto 1fr auto;
    gap: clamp(10px, 2vh, 22px);
    padding: clamp(16px, 2vh, 28px) clamp(20px, 3vh, 40px);
    background:
      radial-gradient(circle at 50% 0%, rgba(245,158,11,0.18), transparent 55%),
      linear-gradient(135deg, var(--card) 0%, var(--surface) 100%);
    border: 1px solid var(--border);
    border-radius: 22px;
    text-align: center; position: relative; overflow: hidden;
  }
  body.display #qbox .finale-head {
    font-size: clamp(20px, 2.8vh, 38px); font-weight: 900;
    color: var(--muted); letter-spacing: clamp(4px, 0.8vh, 10px);
    text-transform: uppercase;
    animation: introIn 0.6s cubic-bezier(0.22, 1, 0.36, 1) 0.05s both;
  }
  body.display #qbox .podium {
    display: grid;
    grid-template-columns: 1fr 1.4fr 1fr;
    gap: clamp(12px, 1.8vh, 22px);
    align-items: end; justify-items: stretch;
    min-height: 0;
  }
  body.display #qbox .podium-spot {
    display: flex; flex-direction: column; align-items: center;
    gap: clamp(6px, 1vh, 12px);
    padding: clamp(14px, 2vh, 24px);
    background: var(--bg-2); border: 3px solid var(--border);
    border-radius: 18px;
    min-height: 0; position: relative;
    animation: introIn 0.8s cubic-bezier(0.22, 1, 0.36, 1) both;
  }
  body.display #qbox .podium-spot.gold   { border-color: #f5c518; animation-delay: 0.45s;
    box-shadow: 0 0 0 4px rgba(245,197,24,0.18), 0 0 60px rgba(245,158,11,0.35); }
  body.display #qbox .podium-spot.silver { border-color: #cbd5e1; animation-delay: 0.20s; }
  body.display #qbox .podium-spot.bronze { border-color: #d97706; animation-delay: 0.30s; }
  body.display #qbox .podium-rank {
    font-size: clamp(28px, 4vh, 56px);
  }
  body.display #qbox .podium-spot.gold .podium-rank {
    font-size: clamp(48px, 7vh, 96px);
    animation: crownBob 2.4s ease-in-out infinite;
  }
  @keyframes crownBob { 50% { transform: translateY(-8px) rotate(-4deg); } }
  body.display #qbox .podium-name {
    font-size: clamp(20px, 3.2vh, 44px); font-weight: 800;
    line-height: 1.1;
  }
  body.display #qbox .podium-spot.gold .podium-name {
    font-size: clamp(28px, 4.6vh, 64px); font-weight: 900;
    background: linear-gradient(135deg, #f5c518, #f59e0b);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  body.display #qbox .podium-score {
    font-size: clamp(32px, 5vh, 72px); font-weight: 900;
    letter-spacing: -2px;
  }
  body.display #qbox .podium-spot.gold .podium-score {
    font-size: clamp(48px, 8vh, 124px);
  }
  body.display #qbox .podium-swatch {
    width: clamp(20px, 2.6vh, 32px); height: clamp(20px, 2.6vh, 32px);
    border-radius: 8px;
  }
  body.display #qbox .podium-runners {
    display: flex; flex-direction: column; gap: 6px;
    color: var(--muted); font-size: clamp(13px, 1.8vh, 20px);
    align-self: end;
    animation: introIn 0.6s cubic-bezier(0.22, 1, 0.36, 1) 0.7s both;
  }
  body.display #qbox .podium-runner {
    display: inline-flex; gap: 8px; align-items: center;
    justify-content: center;
  }
  body.display #qbox .podium-runner .sw {
    width: 10px; height: 10px; border-radius: 3px;
  }

  /* Fixed-position confetti layer — sits above the projector content but
     below the floating toggles. Pieces use plain falling animations and
     hardcoded delays so the same DOM nodes can be hidden/shown with
     `display.confetti` on the body without restarting any animation. */
  #confettiLayer {
    position: fixed; inset: 0;
    pointer-events: none; z-index: 50;
    overflow: hidden; display: none;
  }
  body.confetti-on #confettiLayer { display: block; }
  #confettiLayer .piece {
    position: absolute; top: -20px;
    width: 10px; height: 14px;
    opacity: 0;
    animation: confettiFall linear infinite;
  }
  @keyframes confettiFall {
    0%   { opacity: 0; transform: translate3d(0, -20px, 0) rotate(0); }
    8%   { opacity: 1; }
    100% { opacity: 0.8; transform: translate3d(60px, 105vh, 0) rotate(720deg); }
  }
  @media (prefers-reduced-motion: reduce) {
    #confettiLayer .piece { animation: none; opacity: 0; }
  }

  /* Buzzer-round status banner (sits above the question card on the projector). */
  .buzzer-banner {
    display: flex; align-items: center; gap: 14px;
    padding: 10px 18px; margin: 0 0 8px;
    border-radius: 12px;
    font-weight: 800; letter-spacing: 0.5px;
    text-transform: uppercase; font-size: clamp(14px, 1.8vh, 22px);
    background: var(--bg-2); border: 2px solid var(--border); color: var(--muted);
  }
  .buzzer-banner.armed {
    background: linear-gradient(135deg, rgba(16,185,129,0.25), rgba(16,185,129,0.10));
    border-color: var(--good); color: var(--good);
    animation: bzArmedPulse 1.1s ease-in-out infinite;
  }
  .buzzer-banner.locked {
    background: linear-gradient(135deg, rgba(245,158,11,0.32), rgba(245,158,11,0.12));
    border-color: var(--warn); color: var(--warn);
    animation: bzLockPulse 0.7s ease-in-out infinite;
    font-size: clamp(18px, 2.4vh, 30px);
  }
  .buzzer-banner .swatch { width: 18px; height: 18px; border-radius: 5px; }
  .buzzer-banner .dot {
    width: 14px; height: 14px; border-radius: 50%;
    background: currentColor;
    box-shadow: 0 0 12px currentColor;
  }
  @keyframes bzArmedPulse { 50% { box-shadow: 0 0 0 6px rgba(16,185,129,0.22); } }
  @keyframes bzLockPulse  { 50% { box-shadow: 0 0 0 8px rgba(245,158,11,0.35); transform: scale(1.01); } }

  /* B4 — Background depth: layer soft corner glows over the body gradient so
     the projector doesn't look like a flat default theme on a 75" screen.
     Fixed-attachment so the haze stays put while content swaps. */
  body.display {
    background:
      radial-gradient(900px 620px at 6% -10%,  rgba(99,102,241,0.20), transparent 62%),
      radial-gradient(900px 620px at 100% 110%, rgba(139,92,246,0.22), transparent 62%),
      radial-gradient(520px 520px at 92% 4%,    rgba(99,102,241,0.10), transparent 70%),
      var(--body-bg);
    background-attachment: fixed;
  }
  [data-theme="light"] body.display {
    background:
      radial-gradient(900px 620px at 6% -10%,  rgba(139,92,246,0.18), transparent 62%),
      radial-gradient(900px 620px at 100% 110%, rgba(244,114,182,0.20), transparent 62%),
      radial-gradient(520px 520px at 92% 4%,    rgba(99,102,241,0.10), transparent 70%),
      var(--body-bg);
    background-attachment: fixed;
  }

  /* B6 — New-leader cue: gold ring expands outward when a team takes over
     the top spot. Fired by JS on a real leader transition (not on every
     state push), so the audience gets a clear "lead changes" moment. */
  @keyframes leaderTake {
    0%   { box-shadow: 0 0 0 0   rgba(245,158,11,0.85); transform: scale(1); }
    25%  { box-shadow: 0 0 0 14px rgba(245,158,11,0.30); transform: scale(1.025); }
    70%  { box-shadow: 0 0 0 22px rgba(245,158,11,0);    transform: scale(1.01); }
    100% { box-shadow: 0 0 0 0   rgba(245,158,11,0);    transform: scale(1); }
  }
  body.display .team-card.new-leader {
    animation: leaderTake 2.2s ease-out;
    border-color: var(--warn) !important;
    z-index: 2;
  }
  body.display .team-card.new-leader .rank {
    animation: leaderTake 2.2s ease-out;
  }
  @media (prefers-reduced-motion: reduce) {
    body.display .team-card.new-leader { animation: none; }
    body.display .team-card.new-leader .rank { animation: none; }
  }

  /* B5 — Question entry animation: slide-up + scale-in for whatever mounts
     inside #qbox when the question or display mode actually changes. The
     `.entering` class is added by maybeCrossfade() only on a real key change,
     so toggles like reveal/select don't replay the animation. */
  @keyframes qEnter {
    from { opacity: 0; transform: translateY(14px) scale(0.985); }
    to   { opacity: 1; transform: translateY(0)    scale(1); }
  }
  body.display #qbox.entering > * {
    animation: qEnter 0.42s cubic-bezier(0.22, 1, 0.36, 1) both;
    transform-origin: 50% 30%;
  }
  @media (prefers-reduced-motion: reduce) {
    body.display #qbox.entering > * { animation: none; }
  }
</style>
</head>
<body class="display">
<div id="connBanner" class="conn-banner" role="status" aria-live="polite">
  <span class="dot"></span>Reconnecting to quiz server…
</div>
<div id="confettiLayer" aria-hidden="true"></div>
<button class="audio-toggle floating" onclick="QuizAudio.toggleMuted()" aria-label="Mute sound"><span class="audio-icon">🔊</span></button>
<button class="theme-toggle floating" onclick="toggleTheme()" aria-label="Toggle theme"><span class="theme-icon">☀️</span></button>
<div class="container">

  <div id="title" class="title-banner" style="display:none"></div>

  <div id="qbox"></div>

  <aside class="right-panel">
    <div id="round" class="round-banner"></div>
    <div id="progress" class="round-progress" style="display:none">
      <div class="label"><span id="progress-label"></span></div>
      <div class="track" id="progress-track"></div>
    </div>
    <div id="timerbanner"></div>
    <div id="teams" class="grid grid-3"></div>
  </aside>

</div>
<script src="/quiz/socket.io/socket.io.js"></script>
<script>
const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

const prevScores = new Map(); // team_id -> last-seen score (for delta animation)

// Tracks the current single-leader (or null when tied / no scores). Stays
// `undefined` until the first render so reloading the page mid-show doesn't
// fire the new-leader animation on whoever happens to be in front.
let prevLeader; // undefined | null | team_id

// Animations that should outlast incidental renderTeams re-renders. Maps
// team_id → expiry timestamp; renderTeams re-applies the class after rebuilding
// innerHTML so the gold ring keeps pulsing through host clicks.
const leaderAnimUntil = new Map();

// Tracks the previous state snapshot so we can fire one-shot sounds on
// transitions (correct/wrong/buzzer-armed/buzzer-locked). null on first call
// to avoid playing sounds for state that was already there at page load.
let prevAudio = null;
function fireAudioCues(s) {
  const cur = {
    qid:        s.question ? s.question.id : null,
    revealed:   !!(s.state && s.state.revealed),
    attempted:  !!(s.state && s.state.attempted),
    lastResult: s.state && s.state.last_result,
    armed:      !!(s.state && s.state.buzzer_armed),
    locked:     (s.state && s.state.buzzer_locked_team_id) || null,
  };
  if (prevAudio) {
    // Question changed — reset audio's notion of "already played"
    const sameQ = prevAudio.qid === cur.qid;
    if (sameQ) {
      if (cur.revealed && !prevAudio.revealed && cur.lastResult === 'correct') QuizAudio.playCorrect();
      if (cur.attempted && !prevAudio.attempted && cur.lastResult === 'wrong') QuizAudio.playWrong();
      if (cur.armed && !prevAudio.armed) QuizAudio.playBuzzerArmed();
      if (cur.locked && cur.locked !== prevAudio.locked) QuizAudio.playBuzzerLocked();
    }
  }
  prevAudio = cur;
}

async function refresh() {
  try {
    const s = await fetch('api/public/state',{credentials:'same-origin'}).then(r=>r.json());
    render(s);
  } catch(e) { console.error(e); }
}

function renderProgress(s) {
  const box = document.getElementById('progress');
  if (!s.round || !s.round.question_ids?.length) { box.style.display = 'none'; return; }
  box.style.display = 'block';
  const ids = s.round.question_ids;
  const curIdx = s.question ? ids.indexOf(s.question.id) : -1;
  document.getElementById('progress-label').textContent =
    s.question ? `Question ${curIdx+1} of ${ids.length}` : `${ids.length} questions`;
  document.getElementById('progress-track').innerHTML = ids.map((_, i) => {
    const cls = i < curIdx ? 'done' : (i === curIdx ? 'current' : '');
    return `<div class="slot ${cls}"></div>`;
  }).join('');
}

function renderTeams(s) {
  const container = document.getElementById('teams');
  // Rank by score desc, tie-break by original position
  const ranked = [...s.teams].sort((a,b) => b.score - a.score || a.position - b.position);
  const assignedId = s.state.current_team_id;

  // Detect deltas vs previous snapshot
  const deltas = new Map();
  for (const t of ranked) {
    const prev = prevScores.get(t.id);
    if (prev !== undefined && prev !== t.score) deltas.set(t.id, t.score - prev);
    prevScores.set(t.id, t.score);
  }

  const topScore = ranked[0]?.score ?? 0;
  // Dense rank so tied teams share the same number (10,10,5 -> 1,1,2).
  const rankByTeam = new Map();
  let lastScore = null, denseRank = 0;
  for (const t of ranked) {
    if (t.score !== lastScore) { denseRank += 1; lastScore = t.score; }
    rankByTeam.set(t.id, denseRank);
  }

  // Detect single-leader transitions for the gold "new leader" pulse. Tied
  // tops collapse to null so the cue only fires on a clean lead change.
  const leadersAtTop = ranked.filter((t) => t.score === topScore);
  const currentLeader = (topScore > 0 && leadersAtTop.length === 1) ? leadersAtTop[0].id : null;
  const isFirstRender = prevLeader === undefined;
  if (!isFirstRender && currentLeader && currentLeader !== prevLeader) {
    leaderAnimUntil.set(currentLeader, Date.now() + 2300);
  }
  prevLeader = currentLeader;

  container.innerHTML = ranked.map((t) => {
    const rank = rankByTeam.get(t.id);
    const isLeader = topScore > 0 && t.score === topScore;
    // Hide rank badges entirely when no one has scored yet.
    const showBadge = topScore > 0;
    const rankBadge = showBadge
      ? `<div class="rank ${rank <= 3 ? 'r'+rank : ''}">${isLeader ? '👑' : '#'+rank}</div>`
      : '';
    return `
      <div class="team-card ${assignedId===t.id?'active':''}" data-team="${t.id}" style="border-color:${t.color}">
        ${rankBadge}
        <div class="name"><span class="swatch" style="background:${t.color}"></span>${esc(t.name)}</div>
        <div class="score">${t.score}</div>
      </div>`;
  }).join('') || '<div class="empty"><div class="big">👥</div>No teams loaded yet</div>';

  // Attach flash + bump animations for teams whose score changed
  for (const [teamId, delta] of deltas) {
    const card = container.querySelector(`[data-team="${teamId}"]`);
    if (!card) continue;
    const flash = document.createElement('div');
    flash.className = 'flash' + (delta < 0 ? ' neg' : '');
    flash.textContent = (delta > 0 ? '+' : '') + delta;
    card.appendChild(flash);
    card.classList.add('score-bump');
    setTimeout(() => {
      flash.remove();
      card.classList.remove('score-bump');
    }, 1700);
  }

  // Re-apply the new-leader class to whichever cards are still inside their
  // animation window. innerHTML rewrites strip CSS classes, so without this
  // an unrelated state push mid-pulse would cut the animation short.
  const now = Date.now();
  for (const [teamId, expires] of leaderAnimUntil) {
    if (now >= expires) { leaderAnimUntil.delete(teamId); continue; }
    const card = container.querySelector(`[data-team="${teamId}"]`);
    if (card) card.classList.add('new-leader');
  }
}

function renderLeaderboardEmpty(s) {
  // Shown between questions — keep audience engaged
  const ranked = [...s.teams].sort((a,b) => b.score - a.score || a.position - b.position);
  const hasScores = ranked.some(t => t.score !== 0);
  document.getElementById('qbox').innerHTML = ranked.length && hasScores
    ? `<div class="leaderboard-title">🏆 Leaderboard</div>
       <div class="empty" style="border:none;background:transparent;padding:20px 0;font-size:22px">Get ready for the next question!</div>`
    : '<div class="empty"><div class="big">🎯</div><h1>Get ready!</h1></div>';
}

// Forced "leaderboard" mode: dedicated podium view triggered from the host.
function renderLeaderboardForced(s) {
  const ranked = [...s.teams].sort((a,b) => b.score - a.score || a.position - b.position);
  const top = ranked[0]?.score ?? 0;
  let lastScore = null, denseRank = 0;
  const rows = ranked.map(t => {
    if (t.score !== lastScore) { denseRank += 1; lastScore = t.score; }
    const isLeader = top > 0 && t.score === top;
    const rankLabel = top > 0 ? (isLeader ? '👑' : '#' + denseRank) : '·';
    return `
      <div class="lb-row ${isLeader ? 'leader' : ''}" style="border-color:${t.color}">
        <span class="lb-rank">${rankLabel}</span>
        <span class="lb-swatch" style="background:${t.color}"></span>
        <span class="lb-name">${esc(t.name)}</span>
        <span class="lb-score">${t.score}</span>
      </div>`;
  }).join('');
  document.getElementById('qbox').innerHTML = `
    <div class="lb-wrap">
      <div class="leaderboard-title">🏆 Leaderboard</div>
      <div class="lb-list">${rows || '<div class="empty"><div class="big">👥</div>No teams</div>'}</div>
    </div>`;
}

// Round-intro: cinematic "Round N · The Mystery Round · 12 Q · Get Ready"
// takeover. Sits between rounds — host triggers from /host/display-mode/intro.
function renderIntro(s) {
  const round = s.round;
  if (!round) {
    document.getElementById('qbox').innerHTML = `
      <div class="intro-screen">
        <div class="intro-name">Get Ready</div>
        <div class="intro-cta">A new round begins</div>
      </div>`;
    return;
  }
  const qCount = (round.question_ids || []).length;
  document.getElementById('qbox').innerHTML = `
    <div class="intro-screen">
      <div class="intro-label">Round ${round.round_no}</div>
      <div class="intro-name">${esc(round.name)}</div>
      <div class="intro-meta">
        <span class="pill accent">${esc(round.type)}</span>
        ${qCount ? `<span class="pill">${qCount} Question${qCount === 1 ? '' : 's'}</span>` : ''}
      </div>
      <div class="intro-cta">▸ Get Ready ◂</div>
    </div>`;
}

// Finale: top-3 podium with the winner front-and-center, plus a confetti
// shower toggled via a body class so the rain doesn't restart on every push.
function renderFinale(s) {
  const ranked = [...(s.teams || [])].sort((a, b) => b.score - a.score || a.position - b.position);
  if (!ranked.length) {
    document.getElementById('qbox').innerHTML = `
      <div class="finale-screen">
        <div class="finale-head">🎉 Game Complete 🎉</div>
        <div class="empty"><div class="big">👥</div>No teams</div>
      </div>`;
    return;
  }
  const [first, second, third, ...rest] = ranked;
  const card = (t, kind, rankSym) => t ? `
    <div class="podium-spot ${kind}" style="border-color:${t.color}">
      <div class="podium-rank">${rankSym}</div>
      <div class="podium-swatch" style="background:${t.color}"></div>
      <div class="podium-name">${esc(t.name)}</div>
      <div class="podium-score">${t.score}</div>
    </div>` : '<div></div>';
  const runners = rest.length ? `
    <div class="podium-runners">
      ${rest.map((t, i) => `
        <span class="podium-runner">
          #${i + 4} <span class="sw" style="background:${t.color}"></span> ${esc(t.name)} · ${t.score}
        </span>`).join('')}
    </div>` : '<div></div>';
  document.getElementById('qbox').innerHTML = `
    <div class="finale-screen">
      <div class="finale-head">🎉 Game Complete 🎉</div>
      <div class="podium">
        ${card(second, 'silver', '🥈')}
        ${card(first,  'gold',   '👑')}
        ${card(third,  'bronze', '🥉')}
      </div>
      ${runners}
    </div>`;
}

// Confetti pieces are stable DOM nodes — we just toggle visibility via a body
// class so falling animations don't restart when the projector re-renders.
function ensureConfetti() {
  const layer = document.getElementById('confettiLayer');
  if (!layer || layer.children.length) return;
  const colors = ['#f5c518', '#ef4444', '#10b981', '#6366f1', '#8b5cf6', '#f59e0b', '#3b82f6'];
  const N = 36;
  for (let i = 0; i < N; i++) {
    const p = document.createElement('div');
    p.className = 'piece';
    p.style.left = (Math.random() * 100) + 'vw';
    p.style.background = colors[i % colors.length];
    p.style.animationDuration = (3 + Math.random() * 2.5).toFixed(2) + 's';
    p.style.animationDelay = (-Math.random() * 5).toFixed(2) + 's';
    p.style.transform = `rotate(${Math.floor(Math.random() * 360)}deg)`;
    if (i % 3 === 0) { p.style.width = '14px'; p.style.height = '6px'; p.style.borderRadius = '4px'; }
    layer.appendChild(p);
  }
}

// Forced "hidden" mode: branded holding screen with the quiz title — looks
// intentional on a 75" projector, not like the app crashed.
function renderHidden(s) {
  const title = (s && s.title) ? esc(s.title) : 'Quiz in progress';
  document.getElementById('qbox').innerHTML = `
    <div class="hold-screen">
      <div class="hold-mark">🎯</div>
      <div class="hold-title">${title}</div>
      <div class="hold-sub"><span class="live-dot"></span>Stand by</div>
    </div>`;
}

// Plain text → bullet list when every non-empty line starts with a bullet
// marker. Otherwise preserve newlines via white-space:pre-wrap.
function renderRulesBody(text) {
  const lines = String(text || '').split(/\r?\n/);
  const bulletLine = /^\s*([-*•]|\d+[.)])\s+/;
  const nonEmpty = lines.filter(l => l.trim());
  const allBullets = nonEmpty.length > 0 && nonEmpty.every(l => bulletLine.test(l));
  if (allBullets) {
    return '<ul>' + nonEmpty.map(l => `<li>${esc(l.replace(bulletLine, ''))}</li>`).join('') + '</ul>';
  }
  return esc(text || '');
}

function renderRules(s) {
  const round = s.round;
  if (!round) {
    document.getElementById('qbox').innerHTML =
      '<div class="empty"><div class="big">📋</div><h1>No round selected</h1></div>';
    return;
  }
  const rules = (round.rules || '').trim();
  document.getElementById('qbox').innerHTML = `
    <div class="rules-wrap">
      <div class="rules-head">
        <span class="rno">Round ${round.round_no}</span>
        <span class="rname">${esc(round.name)}</span>
        <span class="rtype">${esc(round.type)}</span>
      </div>
      <div class="rules-body">
        ${rules ? renderRulesBody(rules) : '<div class="empty"><div class="big">📋</div>No rules set for this round</div>'}
      </div>
      <div class="rules-foot">Get ready — questions coming up next ▶</div>
    </div>`;
}

function render(s) {
  const titleEl = document.getElementById('title');
  if (s.title) { titleEl.textContent = s.title; titleEl.style.display = 'block'; }
  else titleEl.style.display = 'none';

  renderTeams(s);

  document.getElementById('round').textContent = s.round
    ? `Round ${s.round.round_no} · ${s.round.name}` : '';

  renderProgress(s);

  const mode = (s.state && s.state.display_mode) || 'question';
  const qb = document.getElementById('qbox');
  // Use mode in the crossfade key so flipping host toggles always animates.
  const fadeKey = mode === 'question'
    ? (s.question ? `q:${s.question.id}` : 'empty')
    : `mode:${mode}`;
  const applyBody = () => {
    if (mode === 'leaderboard') renderLeaderboardForced(s);
    else if (mode === 'hidden') renderHidden(s);
    else if (mode === 'rules') renderRules(s);
    else if (mode === 'intro') renderIntro(s);
    else if (mode === 'finale') { ensureConfetti(); renderFinale(s); }
    else if (s.question) renderQuestionBody(s);
    // No current question — round just ended or we're between questions.
    // If anyone has scored, show the full ranked podium (not just a heading)
    // so the audience can read the standings while the host advances.
    else if ((s.teams || []).some((t) => t.score !== 0)) renderLeaderboardForced(s);
    else renderLeaderboardEmpty(s);
  };
  maybeCrossfade(fadeKey, applyBody);
  // Confetti only shows during finale — toggled via body class so the falling
  // pieces don't restart on every state push.
  document.body.classList.toggle('confetti-on', mode === 'finale');
  // Timer only shows during the live question view.
  renderTimer(mode === 'question' ? s.state : null);
  fireAudioCues(s);
}

function renderQuestionBody(s) {
  const qb = document.getElementById('qbox');
  const q = s.question;
  {
    const wrongs = s.state.wrong_options || [];
    const removed = s.state.removed_option;
    let opts = '';
    if (q.type === 'mcq' && q.options) {
      const sel = s.state.selected_option;
      opts = '<div class="options">' +
        ['a','b','c','d'].filter(k=>q.options[k]).map(k => {
          const cls = [];
          if (s.state.revealed && q.answer===k) cls.push('correct');
          else if (wrongs.includes(k)) cls.push('wrong');
          if (sel===k) cls.push('selected');
          if (removed===k) cls.push('removed');
          return `<div class="option ${cls.join(' ')}"><span class="key">${k.toUpperCase()}.</span>${esc(q.options[k])}</div>`;
        }).join('') + '</div>';
    }
    const hintLvl = s.state.hint_level || 0;
    const passLvl = s.state.pass_level || 0;
    const assigned = s.teams.find(t => t.id === s.state.current_team_id);
    const lastForCurrent = (s.recent || []).find(r =>
      r.question_id === q.id && r.team_id === s.state.current_team_id &&
      ['correct','wrong','pass'].includes(r.result));
    const verdictHtml = lastForCurrent
      ? (lastForCurrent.result === 'correct'
          ? `<span class="verdict good">✓ Correct +${lastForCurrent.points_awarded}</span>`
          : lastForCurrent.result === 'wrong'
            ? `<span class="verdict bad">✗ Wrong</span>`
            : `<span class="verdict warn">↪ Passed</span>`)
      : (s.state.attempted ? `<span class="verdict bad">✗ Wrong</span>` : '');
    const assignedBanner = assigned
      ? `<div class="assigned-banner" style="border-color:${assigned.color}">
           <span class="swatch" style="background:${assigned.color}"></span>
           <span>Assigned to <b>${esc(assigned.name)}</b></span>
           ${verdictHtml}
         </div>` : '';
    let buzzerBanner = '';
    if (s.round && s.round.type === 'buzzer') {
      const lockedId = s.state.buzzer_locked_team_id;
      const lockedTeam = lockedId ? s.teams.find(t => t.id === lockedId) : null;
      if (lockedTeam) {
        buzzerBanner = `<div class="buzzer-banner locked" style="border-color:${lockedTeam.color}">
            <span class="swatch" style="background:${lockedTeam.color}"></span>
            🔔 ${esc(lockedTeam.name)} buzzed first!
          </div>`;
      } else if (s.state.buzzer_armed) {
        buzzerBanner = `<div class="buzzer-banner armed">
            <span class="dot"></span> Buzzers LIVE — first to press wins
          </div>`;
      } else {
        buzzerBanner = `<div class="buzzer-banner">
            🔔 Buzzer round — captains, get ready
          </div>`;
      }
    }
    qb.innerHTML = `
      <div class="q-card">
        ${buzzerBanner}
        ${assignedBanner}
        <div class="q-meta">
          <span class="badge">${esc(q.type)}</span>
          <span class="badge gray">${q.points} pts</span>
          ${passLvl>0?`<span class="badge warn">Pass ×${passLvl}</span>`:''}
          ${hintLvl>0?`<span class="badge warn">Hint ×${hintLvl}</span>`:''}
        </div>
        <div class="q-text">${esc(q.question)}</div>
        ${q.image ? `<img class="q-image" src="uploads/${esc(q.image)}">` : ''}
        ${q.audio ? `<audio class="q-audio" controls preload="metadata" src="uploads/${esc(q.audio)}" style="width:100%;margin-top:14px"></audio>` : ''}
        ${s.state.clue ? `<div class="clue-banner"><b>💡 Clue:</b> ${esc(s.state.clue)}</div>` : ''}
        ${opts}
        ${q.answer && q.type !== 'mcq' ? `<div class="answer-box"><b>Answer:</b> ${esc(q.answer)}</div>` : ''}
      </div>`;
  }
}
let timerTick = null;
const R = 46, C = 2 * Math.PI * R; // ring geometry (viewBox 100x100)
function renderTimer(st) {
  const box = document.getElementById('timerbanner');
  if (!box) return;
  if (timerTick) { clearInterval(timerTick); timerTick = null; }
  if (!st || !st.timer_started_at) { box.innerHTML = ''; return; }
  const start = new Date(st.timer_started_at).getTime();
  const dur = st.timer_duration || 30;
  box.innerHTML = `
    <div class="timer-ring-wrap">
      <div class="timer-ring" id="ring">
        <svg viewBox="0 0 100 100">
          <circle class="bg" cx="50" cy="50" r="${R}" fill="none" stroke-width="7"/>
          <circle class="fg" cx="50" cy="50" r="${R}" fill="none" stroke="var(--good)" stroke-width="7"
                  stroke-dasharray="${C}" stroke-dashoffset="0"/>
        </svg>
        <div class="txt">0</div>
      </div>
    </div>`;
  const ring = document.getElementById('ring');
  const fg = ring.querySelector('.fg');
  const txt = ring.querySelector('.txt');
  let lastShown = null;
  const update = () => {
    const elapsed = (Date.now() - start) / 1000;
    const left = Math.max(0, dur - elapsed);
    const shown = Math.ceil(left);
    const frac = Math.max(0, Math.min(1, left / dur));
    fg.style.strokeDashoffset = String(C * (1 - frac));
    txt.textContent = shown;
    ring.classList.toggle('crit', shown <= 5 && shown > 0);
    ring.classList.toggle('warn', shown > 5 && shown <= 10);
    // Tick on each second-transition during the final 5s; alarm at 0.
    if (lastShown !== null && shown !== lastShown) {
      if (shown > 0 && shown <= 5) QuizAudio.playTick();
      else if (shown === 0)        QuizAudio.playTimerUp();
    }
    lastShown = shown;
    if (left <= 0) { clearInterval(timerTick); timerTick = null; }
  };
  update(); timerTick = setInterval(update, 100);
}

// Crossfade qbox when the question id changes. We also tag the box with
// `.entering` for ~450ms after a real key change so the slide-up + scale-in
// animation runs on the new content (B5) — this avoids replaying every time
// a host toggle pushes a state event for the same question.
let lastQid = null;
let enterClearTimer = null;
function maybeCrossfade(nextQid, apply) {
  const qb = document.getElementById('qbox');
  const changed = lastQid !== null && lastQid !== nextQid;
  const flagEntered = () => {
    if (enterClearTimer) clearTimeout(enterClearTimer);
    qb.classList.add('entering');
    enterClearTimer = setTimeout(() => qb.classList.remove('entering'), 480);
  };
  if (changed) {
    qb.classList.add('fading');
    setTimeout(() => {
      apply();
      qb.classList.remove('fading');
      flagEntered();
      lastQid = nextQid;
    }, 200);
  } else {
    apply(); lastQid = nextQid;
  }
}
const sock = io('/public', { path: '/quiz/socket.io' });
const connBanner = document.getElementById('connBanner');
let connDownTimer = null;
function showConnLost() {
  // small grace period — short blips shouldn't flash the banner
  if (connDownTimer) return;
  connDownTimer = setTimeout(() => connBanner.classList.add('show'), 1200);
}
function hideConnLost() {
  if (connDownTimer) { clearTimeout(connDownTimer); connDownTimer = null; }
  connBanner.classList.remove('show');
}
sock.on('connect',     () => { hideConnLost(); refresh(); });
sock.on('disconnect',  showConnLost);
sock.on('reconnect',   () => { hideConnLost(); refresh(); });
sock.on('connect_error', showConnLost);
// Server already pushes the full snapshot in the `state` event — render
// directly instead of round-tripping a second HTTP fetch per push.
sock.on('state', (s) => { try { render(s); } catch (e) { console.error(e); } });
refresh();
</script>
</body></html>
