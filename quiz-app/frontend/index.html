<!DOCTYPE html>
<html><head><meta charset="utf-8"><meta http-equiv="Cache-Control" content="no-store, must-revalidate"><title>Quiz Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css?v=9">
<script src="theme.js?v=1"></script></head>
<body>
<button class="theme-toggle floating" onclick="toggleTheme()" aria-label="Toggle theme"><span class="theme-icon">☀️</span></button>
<div class="container">
  <div class="card center" style="padding: 48px 24px;">
    <h1 style="font-size:42px;background:linear-gradient(135deg,var(--accent),var(--accent-2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;">🎯 Kids Quiz Hub</h1>
    <p class="muted" style="font-size:16px;">Live, host-driven quiz with real-time scoring</p>
  </div>
  <div class="grid grid-2">
    <a href="admin" style="text-decoration:none;color:inherit"><div class="card" style="cursor:pointer;text-align:center;">
      <div style="font-size:48px;">⚙️</div><h2>Admin</h2>
      <p class="muted">Upload questions, manage images, reset scores</p>
    </div></a>
    <a href="host" style="text-decoration:none;color:inherit"><div class="card" style="cursor:pointer;text-align:center;">
      <div style="font-size:48px;">🎮</div><h2>Host</h2>
      <p class="muted">Run the quiz live</p>
    </div></a>
    <a href="display" target="_blank" style="text-decoration:none;color:inherit"><div class="card" style="cursor:pointer;text-align:center;">
      <div style="font-size:48px;">📺</div><h2>Big Screen</h2>
      <p class="muted">Projector / audience view</p>
    </div></a>
    <a href="scores" style="text-decoration:none;color:inherit"><div class="card" style="cursor:pointer;text-align:center;">
      <div style="font-size:48px;">📊</div><h2>Scorecard</h2>
      <p class="muted">Detailed scores + CSV export</p>
    </div></a>
    <a href="buzzer" style="text-decoration:none;color:inherit"><div class="card" style="cursor:pointer;text-align:center;">
      <div style="font-size:48px;">🔔</div><h2>Buzzer</h2>
      <p class="muted">Captain's mobile buzzer (one device per team)</p>
    </div></a>
  </div>
</div></body></html>
