# Reference only. Real service lives in ../docker-compose.yml.
# Secrets are sourced from ../.env — see ./.env.example.

  quiz:
    build: ./quiz-app
    container_name: quiz-app
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3100
      - BASE_PATH=/quiz
      - UPLOAD_DIR=/app/uploads
      - SESSION_SECRET=${QUIZ_SESSION_SECRET:?set QUIZ_SESSION_SECRET in .env}
      - ADMIN_PASSWORD_HASH=${QUIZ_ADMIN_PASSWORD_HASH:-}
      - ADMIN_PASSWORD=${QUIZ_ADMIN_PASSWORD:-}
      - DATABASE_URL=postgres://quiz:${QUIZ_DB_PASSWORD:?set QUIZ_DB_PASSWORD in .env}@quiz-db:5432/quiz
    depends_on:
      quiz-db:
        condition: service_healthy
    volumes:
      - quiz-uploads:/app/uploads
    networks:
      - web
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3100/quiz/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  quiz-db:
    image: postgres:16-alpine
    container_name: quiz-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=quiz
      - POSTGRES_PASSWORD=${QUIZ_DB_PASSWORD:?set QUIZ_DB_PASSWORD in .env}
      - POSTGRES_DB=quiz
    volumes:
      - quiz-db-data:/var/lib/postgresql/data
    networks:
      - web
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quiz -d quiz"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s
