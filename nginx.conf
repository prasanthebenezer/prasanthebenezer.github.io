# HTTP server - redirect to HTTPS
server {
    listen 80;
    server_name prasanthebenezer.com www.prasanthebenezer.com;

    # Let's Encrypt challenge location
    location /.well-known/acme-challenge/ {
        root /usr/share/nginx/html;
    }

    # Redirect all other traffic to HTTPS
    location / {
        return 301 https://prasanthebenezer.com$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl http2;
    server_name www.prasanthebenezer.com;

    # SSL certificates
    ssl_certificate /etc/letsencrypt/live/prasanthebenezer.com-0001/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/prasanthebenezer.com-0001/privkey.pem;

    # SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Redirect www to non-www
    return 301 https://prasanthebenezer.com$request_uri;
}

# Main HTTPS server
server {
    listen 443 ssl http2;
    server_name prasanthebenezer.com;
    root /usr/share/nginx/html;
    index index.html;

    # SSL certificates
    ssl_certificate /etc/letsencrypt/live/prasanthebenezer.com-0001/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/prasanthebenezer.com-0001/privkey.pem;

    # SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # HSTS (optional but recommended)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;

    # Cache static assets
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|pdf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Handle routing for SPA (if needed)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Error pages
    error_page 404 /index.html;
}

# HTTP → HTTPS redirect for maintenance subdomain
server {
    listen 80;
    server_name maintenance.prasanthebenezer.com;

    location /.well-known/acme-challenge/ {
        root /usr/share/nginx/html;
    }

    location / {
        return 301 https://maintenance.prasanthebenezer.com$request_uri;
    }
}

# HTTPS reverse proxy for maintenance subdomain
server {
    listen 443 ssl http2;
    server_name maintenance.prasanthebenezer.com;

    ssl_certificate /etc/letsencrypt/live/prasanthebenezer.com-0001/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/prasanthebenezer.com-0001/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Proxy to maintenance FastAPI app
    location / {
        proxy_pass http://maintenance:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 10M;
    }
}

