<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Name the Colour!</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Fredoka', 'Inter', system-ui, sans-serif;
            background:
                radial-gradient(circle at 10% 10%, #ffe0ec 0%, transparent 40%),
                radial-gradient(circle at 90% 20%, #d9f1ff 0%, transparent 40%),
                radial-gradient(circle at 50% 90%, #fff6cc 0%, transparent 40%),
                linear-gradient(135deg, #f5f7ff 0%, #fef6ff 100%);
            color: #1d1d1f;
            min-height: 100vh;
            padding: 2rem 1rem 3rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        header {
            text-align: center;
            margin-bottom: 1.25rem;
            max-width: 760px;
        }

        h1 {
            font-family: 'Fredoka', sans-serif;
            font-size: clamp(2.4rem, 6vw, 3.8rem);
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(90deg, #e53935, #fb8c00, #fbc02d, #43a047, #1e88e5, #8e24aa);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.01em;
        }

        h1 .wave {
            display: inline-block;
            animation: wave 1.6s ease-in-out infinite;
            transform-origin: 70% 70%;
        }

        @keyframes wave {
            0%, 60%, 100% { transform: rotate(0); }
            10% { transform: rotate(14deg); }
            20% { transform: rotate(-8deg); }
            30% { transform: rotate(14deg); }
            40% { transform: rotate(-4deg); }
            50% { transform: rotate(10deg); }
        }

        p.lead {
            color: #444;
            font-size: clamp(1.05rem, 2.5vw, 1.25rem);
            line-height: 1.5;
            font-weight: 500;
        }

        p.lead strong { color: #1d1d1f; }

        .scoreboard {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: white;
            padding: 0.55rem 1.1rem;
            border-radius: 999px;
            box-shadow: 0 4px 14px rgba(0,0,0,0.08);
            font-weight: 600;
            font-size: 1.1rem;
            margin: 0.75rem 0 1.5rem;
        }

        .scoreboard .star { font-size: 1.3rem; }
        .scoreboard .count {
            color: #8e24aa;
            font-weight: 700;
            min-width: 1.5ch;
            text-align: center;
        }

        .controls {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 1.75rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            font-family: inherit;
            font-size: 1.05rem;
            font-weight: 600;
            padding: 0.75rem 1.6rem;
            border: none;
            border-radius: 999px;
            background: linear-gradient(135deg, #1e88e5, #8e24aa);
            color: white;
            cursor: pointer;
            box-shadow: 0 4px 14px rgba(30, 136, 229, 0.35);
            transition: transform 0.12s ease, box-shadow 0.2s;
        }

        button:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(30, 136, 229, 0.45); }
        button:active { transform: translateY(0) scale(0.96); }

        button.secondary {
            background: white;
            color: #1d1d1f;
            border: 2px solid #ffd54f;
            box-shadow: 0 4px 14px rgba(255, 213, 79, 0.35);
        }

        button.secondary:hover { background: #fffbe6; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 1.1rem 1.5rem;
            width: 100%;
            max-width: 1200px;
            background: white;
            padding: 2rem;
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
            border: 3px dashed #ffd54f;
        }

        .word {
            font-family: 'Fredoka', sans-serif;
            font-size: clamp(2.4rem, 5vw, 3.5rem);
            font-weight: 700;
            text-align: center;
            padding: 0.9rem 0.6rem;
            user-select: none;
            text-transform: uppercase;
            letter-spacing: 0.02em;
            line-height: 1.1;
            border-radius: 16px;
            cursor: pointer;
            transition: transform 0.15s ease, background 0.2s;
            position: relative;
        }

        .word:hover {
            background: #fafafa;
            transform: scale(1.04) rotate(-1deg);
        }

        .word.pop {
            animation: pop 0.5s ease;
        }

        @keyframes pop {
            0%   { transform: scale(1); }
            40%  { transform: scale(1.25) rotate(3deg); }
            70%  { transform: scale(0.95) rotate(-2deg); }
            100% { transform: scale(1); }
        }

        .sparkle {
            position: fixed;
            pointer-events: none;
            font-size: 1.4rem;
            animation: fly 0.9s ease-out forwards;
            z-index: 10;
        }

        @keyframes fly {
            0%   { transform: translate(-50%, -50%) scale(0.6); opacity: 1; }
            100% { transform: translate(var(--dx), var(--dy)) scale(1.3); opacity: 0; }
        }

        footer {
            margin-top: 2rem;
            font-size: 0.95rem;
            color: #666;
            text-align: center;
            max-width: 560px;
            font-weight: 500;
        }

        a { color: #0071e3; text-decoration: none; font-weight: 600; }
        a:hover { text-decoration: underline; }

        @media (max-width: 480px) {
            .grid { padding: 1.25rem; gap: 0.75rem; }
            .word { font-size: 2.2rem; padding: 0.6rem 0.4rem; }
        }
    </style>
</head>
<body>
    <header>
        <h1>Name the Colour<span class="wave">👋</span></h1>
        <p class="lead">Say the <strong>colour of the ink</strong>, not the word! 🌈<br>Can you trick your brain? Tap a word to pop it!</p>
    </header>

    <div class="scoreboard" aria-live="polite">
        <span class="star">⭐</span>
        <span>Pops: <span class="count" id="score">0</span></span>
    </div>

    <div class="controls">
        <button id="shuffleBtn">🔀 Shuffle</button>
        <button id="moreBtn" class="secondary">➕ More words</button>
    </div>

    <div class="grid" id="grid" aria-label="Colour words"></div>

    <footer>
        <p>Your eyes read the word but your mouth has to say the colour — tricky, right? 🧠✨<br><a href="index.html">← Back to portfolio</a></p>
    </footer>

    <script>
        const COLOURS = [
            { name: 'RED',    hex: '#e53935' },
            { name: 'BLUE',   hex: '#1e88e5' },
            { name: 'GREEN',  hex: '#2e7d32' },
            { name: 'YELLOW', hex: '#f9a825' },
            { name: 'ORANGE', hex: '#fb8c00' },
            { name: 'PURPLE', hex: '#8e24aa' },
            { name: 'PINK',   hex: '#ec407a' },
            { name: 'BLACK',  hex: '#111111' },
            { name: 'BROWN',  hex: '#6d4c41' },
            { name: 'GREY',   hex: '#757575' },
        ];

        const SPARKLES = ['✨', '⭐', '🌟', '💥', '🎉', '🌈'];

        const grid = document.getElementById('grid');
        const scoreEl = document.getElementById('score');
        let wordCount = 18;
        let score = 0;

        function pickMismatchedColour(wordName) {
            const choices = COLOURS.filter(c => c.name !== wordName);
            return choices[Math.floor(Math.random() * choices.length)];
        }

        function spawnSparkles(x, y) {
            for (let i = 0; i < 6; i++) {
                const s = document.createElement('span');
                s.className = 'sparkle';
                s.textContent = SPARKLES[Math.floor(Math.random() * SPARKLES.length)];
                s.style.left = x + 'px';
                s.style.top = y + 'px';
                const angle = Math.random() * Math.PI * 2;
                const dist = 60 + Math.random() * 60;
                s.style.setProperty('--dx', Math.cos(angle) * dist + 'px');
                s.style.setProperty('--dy', Math.sin(angle) * dist + 'px');
                document.body.appendChild(s);
                setTimeout(() => s.remove(), 900);
            }
        }

        function handleWordTap(e) {
            const el = e.currentTarget;
            el.classList.remove('pop');
            void el.offsetWidth;
            el.classList.add('pop');
            const rect = el.getBoundingClientRect();
            spawnSparkles(rect.left + rect.width / 2, rect.top + rect.height / 2);
            score += 1;
            scoreEl.textContent = score;

            const word = COLOURS[Math.floor(Math.random() * COLOURS.length)];
            const ink = pickMismatchedColour(word.name);
            el.textContent = word.name;
            el.style.color = ink.hex;
        }

        function render() {
            grid.innerHTML = '';
            for (let i = 0; i < wordCount; i++) {
                const word = COLOURS[Math.floor(Math.random() * COLOURS.length)];
                const ink = pickMismatchedColour(word.name);
                const span = document.createElement('span');
                span.className = 'word';
                span.textContent = word.name;
                span.style.color = ink.hex;
                span.addEventListener('click', handleWordTap);
                grid.appendChild(span);
            }
        }

        document.getElementById('shuffleBtn').addEventListener('click', render);
        document.getElementById('moreBtn').addEventListener('click', () => {
            wordCount += 6;
            render();
        });

        render();
    </script>
</body>
</html>
